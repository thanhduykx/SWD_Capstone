services:
  postgres:
    image: postgres:16-alpine
    container_name: cpms-postgres
    environment:
      POSTGRES_DB: cpms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - cpms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cpms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cpms_postgres_data:
